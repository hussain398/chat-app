
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدمات حسين</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* الهيدر */
.header {
    background: #007BFF;
    color: white;
    text-align: center;
    padding: 25px;
    font-size: 28px;
    font-weight: bold;
}

/* الأقسام */
.section {
    padding: 15px;
    max-width: 900px;
    margin: auto;
}

/* الأزرار */
button {
    padding: 14px;
    margin: 8px 0;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    width: 100%;
    transition: 0.2s;
}

button:active {
    transform: scale(0.98);
}

/* زر الرجوع */
.back {
    background: #444;
    color: white;
}

/* الكروت */
.card {
    background: white;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    font-size: 18px;
}

.card p {
    margin: 0 0 10px 0;
    font-size: 18px;
}

/* تحسين الجوال */
@media (max-width: 600px) {
    .header {
        font-size: 24px;
        padding: 20px;
    }

    .section {
        padding: 10px;
    }

    .card {
        padding: 22px;
        font-size: 18px;
    }

    button {
        font-size: 19px;
        padding: 16px;
    }
}
</style>
</head>

<body>

<div class="header">خدمات حسين</div>

<!-- القائمة الرئيسية -->
<div id="main" class="section">
    <h2>الأقسام</h2>
    <button onclick="showSection('games')">🎮 خدمات الألعاب</button>
    <button onclick="showSection('cars')">🚗 غسيل السيارات</button>
    <button onclick="showSection('home')">🏠 تنظيف البيوت</button>
    <button onclick="showSection('cart')">🛒 السلة</button>
</div>

<!-- الألعاب -->
<div id="games" class="section" style="display:none">
    <button class="back" onclick="showSection('main')">⬅ رجوع</button>
    <h3>براول ستار</h3>

    <div class="card">
        <p>رفع 1000 كأس - 1.5 دينار</p>
        <button onclick="addToCart('1000 كأس',1.5)">إضافة للسلة</button>
    </div>

    <div class="card">
        <p>رفع 2000 كأس - 2 دينار</p>
        <button onclick="addToCart('2000 كأس',2)">إضافة للسلة</button>
    </div>

    <div class="card">
        <p>رفع 3000 كأس - 2.5 دينار</p>
        <button onclick="addToCart('3000 كأس',2.5)">إضافة للسلة</button>
    </div>
</div>

<!-- السيارات -->
<div id="cars" class="section" style="display:none">
    <button class="back" onclick="showSection('main')">⬅ رجوع</button>

    <div class="card">
        <p>سيارة صغيرة - 1.5 دينار</p>
        <button onclick="addToCart('سيارة صغيرة',1.5)">إضافة للسلة</button>
    </div>

    <div class="card">
        <p>سيارة كبيرة - 3 دينار</p>
        <button onclick="addToCart('سيارة كبيرة',3)">إضافة للسلة</button>
    </div>
</div>

<!-- تنظيف البيوت -->
<div id="home" class="section" style="display:none">
    <button class="back" onclick="showSection('main')">⬅ رجوع</button>

    <div class="card">
        <p>تنظيف الطابق الأول - 1 دينار</p>
        <button onclick="addToCart('طابق أول',1)">إضافة للسلة</button>
    </div>

    <div class="card">
        <p>تنظيف الطابق الثاني - 1 دينار</p>
        <button onclick="addToCart('طابق ثاني',1)">إضافة للسلة</button>
    </div>

    <div class="card">
        <p>تنظيف الطابق الثالث - 1 دينار</p>
        <button onclick="addToCart('طابق ثالث',1)">إضافة للسلة</button>
    </div>
</div>

<!-- السلة -->
<div id="cart" class="section" style="display:none">
    <button class="back" onclick="showSection('main')">⬅ رجوع</button>

    <h3>السلة</h3>
    <ul id="cartItems"></ul>
    <p id="total"></p>

    <button onclick="checkout()">شراء</button>
</div>

<script>
let cart = [];

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function addToCart(name, price) {
    cart.push({name, price});
    alert("تمت الإضافة للسلة");
}

function checkout() {
    let list = document.getElementById("cartItems");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item.name + " - " + item.price + " دينار";
        list.appendChild(li);
        total += item.price;
    });

    document.getElementById("total").textContent = "المجموع: " + total + " دينار";

    alert("تم الشراء! تواصل معنا على واتساب: 38055385");

    cart = [];
}
</script>

</body>
</html>
