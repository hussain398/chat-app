
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>دردشة بالإيدي</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#87CEEB;
  height:100vh;
}

.app{
  width:100%;
  height:100vh;
  background:#fff;
  display:flex;
  flex-direction:column;
}

.hidden{display:none}

header{
  background:#4CAF50;
  color:#fff;
  padding:10px;
  text-align:center;
  font-size:15px;
}

.main{
  flex:1;
  display:flex;
  min-height:0;
}

.friends{
  width:30%;
  max-width:200px;
  border-right:1px solid #ccc;
  overflow-y:auto;
}

.friend{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.friend:hover{background:#f1f1f1}

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.messages{
  flex:1;
  padding:12px;
  overflow-y:auto;
  background:#f9f9f9;
}

.me{
  text-align:right;
  margin:6px 0;
}
.other{
  text-align:left;
  color:#0a7a0a;
  margin:6px 0;
}

.input-box{
  display:flex;
  gap:6px;
  padding:6px;
  border-top:1px solid #ccc;
}

.input-box input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}

.input-box button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#4CAF50;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

.add{
  padding:6px;
  border-top:1px solid #ccc;
}

.add input{
  width:100%;
  margin-top:4px;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:13px;
}

.add button{
  width:100%;
  margin-top:4px;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#4CAF50;
  color:#fff;
  font-size:13px;
}

.login{
  width:100%;
  max-width:380px;
  background:#fff;
  margin:auto;
  margin-top:20vh;
  border-radius:10px;
  padding:15px;
}
.login input,.login button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:6px;
}
.login button{
  background:#4CAF50;
  color:#fff;
  border:none;
}

@media(max-width:600px){
  .friends{width:35%}
}
</style>
</head>

<body>

<div class="login" id="loginBox">
  <header>🔐 تسجيل الدخول</header>
  <input id="username" placeholder="اسم المستخدم">
  <input id="password" type="password" placeholder="كلمة المرور (حروف + أرقام)">
  <button onclick="login()">دخول</button>
</div>

<div class="app hidden" id="appBox">
  <header>
    💬 دردشة بالإيدي<br>
    <small>إيديك: <b id="myIdText"></b></small>
  </header>

  <div class="main">
    <div class="friends">
      <div style="padding:8px;font-weight:bold">المحادثات</div>
      <div id="friendsList"></div>
    </div>

    <div class="chat">
      <div class="messages" id="messages"></div>

      <div class="input-box">
        <input id="msgInput" placeholder="اكتب رسالة">
        <button onclick="sendMessage()">إرسال</button>
      </div>
    </div>
  </div>

  <div class="add">
    <input id="friendId" placeholder="إيدي صديق (8 أرقام)">
    <input id="friendName" placeholder="اسم الصديق">
    <button onclick="startChat()">بدء محادثة جديدة</button>
  </div>
</div>

<script>
let myId="";
let chatKey="";

function login(){
  const u = username.value.trim();
  const p = password.value.trim();

  if(u.length < 3){
    alert("اسم المستخدم 3 أحرف على الأقل");
    return;
  }

  if(p.length < 6){
    alert("كلمة المرور يجب أن تكون 6 أحرف أو أكثر");
    return;
  }

  const key = "acc_" + u + "_" + p;

  if(!localStorage.getItem(key)){
    localStorage.setItem(
      key,
      Math.floor(10000000 + Math.random() * 90000000)
    );
  }

  myId = localStorage.getItem(key);
  myIdText.textContent = myId;

  loginBox.classList.add("hidden");
  appBox.classList.remove("hidden");
  loadFriends();
}

function startChat(){
  const id = friendId.value.trim();
  const name = friendName.value.trim();
  if(id.length !== 8 || !name) return;

  let f = JSON.parse(localStorage.getItem("friends_" + myId) || "[]");
  if(!f.find(x => x.id === id)){
    f.push({id, name});
    localStorage.setItem("friends_" + myId, JSON.stringify(f));
  }
  openChat(id);
  loadFriends();
}

function loadFriends(){
  friendsList.innerHTML = "";
  const f = JSON.parse(localStorage.getItem("friends_" + myId) || "[]");
  f.forEach(x => {
    const d = document.createElement("div");
    d.className = "friend";
    d.textContent = x.name;
    d.onclick = () => openChat(x.id);
    friendsList.appendChild(d);
  });
}

function openChat(fid){
  chatKey = [myId, fid].sort().join("_");
  loadMessages();
}

function loadMessages(){
  if(!chatKey) return;
  const m = JSON.parse(localStorage.getItem(chatKey) || "[]");
  messages.innerHTML = "";
  m.forEach(x => {
    const d = document.createElement("div");
    d.className = x.sender === myId ? "me" : "other";
    d.textContent = x.text;
    messages.appendChild(d);
  });
  messages.scrollTop = messages.scrollHeight;
}

function sendMessage(){
  if(!msgInput.value || !chatKey) return;
  const m = JSON.parse(localStorage.getItem(chatKey) || "[]");
  m.push({sender: myId, text: msgInput.value});
  localStorage.setItem(chatKey, JSON.stringify(m));
  msgInput.value = "";
  loadMessages();
}
 // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  // Your web app's Firebase configuration

    authDomain: "gdsg-533fc.firebaseapp.com",
    databaseURL: "https://gdsg-533fc-default-rtdb.firebaseio.com",
    projectId: "gdsg-533fc",
    storageBucket: "gdsg-533fc.firebasestorage.app",
    messagingSenderId: "298512385375",
    appId: "1:298512385375:web:2b79a675a50cce6dd962ea"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
 const database = getDatabase(app);

export { database };

import { database } from "./config.js";
import { ref,set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";





setInterval(loadMessages, 1000);
</script>

</body>
</html>
